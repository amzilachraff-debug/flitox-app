name: Build FLITOX APK

on:
  push:
    branches: [ main ]

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v3

      - name: Set up Java 17
        uses: actions/setup-java@v3
        with:
          java-version: '17'
          distribution: 'temurin'

      - name: Setup Gradle
        run: |
          cd flitox-app
          cat > gradlew << 'GRADLEW'
          #!/bin/sh
          DIRNAME=$(dirname "$0")
          exec gradle -p "$DIRNAME" "$@"
          GRADLEW
          chmod +x gradlew

      - name: Build Debug APK
        run: |
          cd flitox-app
          ./gradlew assembleDebug --stacktrace

      - name: Upload APK
        uses: actions/upload-artifact@v3
        with:
          name: FLITOX-APK
          path: flitox-app/app/build/outputs/apk/debug/app-debug.apk
